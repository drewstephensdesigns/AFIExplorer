name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      # This step recreates your secret Firebase file (See Step 4!)
      - name: Access Google Services Config
        run: echo "${{ secrets.FIREBASE_CONFIG }}" > app/google-services.json

      - name: Build with Gradle
        run: ./gradlew assembleRelease bundleRelease

      - name: Upload Finished APK (App File)
        uses: actions/upload-artifact@v4
        with:
          name: AFIExplorer-APK
          path: app/build/outputs/apk/release/*.apk

      - name: Upload Finished AAB (Play Store File)
        uses: actions/upload-artifact@v4
        with:
          name: AFIExplorer-Bundle
          path: app/build/outputs/bundle/release/*.aab