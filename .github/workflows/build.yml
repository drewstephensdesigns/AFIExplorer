# .yml formatting for Github Actions:
# All list dashes (-) under the steps: block must align exactly
# on the same vertical column (usually indented by 6 spaces if
# following standard GitHub structure). If you use a code editor
# like VS Code, installing a YAML extension will highlight these
# alignment errors automatically before you commit!
#

name: Android CI/CD Pipeline
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: "temurin"
          cache: gradle

      # 3️⃣ Make Gradle executable
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 4️⃣ Recreate Firebase config
      - name: Decode google-services.json
        run: echo "$FIREBASE_CONFIG_BASE64" | base64 --decode > app/google-services.json
        env:
          FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_CONFIG_BASE64 }}

      # 5️⃣ Recreate Keystore
      - name: Decode Keystore
        run: echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # 6️⃣ Build signed APK + AAB
      - name: Build Signed App
        run: |
          ./gradlew assembleRelease bundleRelease \
          -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/app/release.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # 7️⃣ Upload APK (Artifacts tab)
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AFIExplorer-APK
          path: app/build/outputs/apk/release/*.apk

      # 8️⃣ Upload AAB (Artifacts tab)
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AFIExplorer-Bundle
          path: app/build/outputs/bundle/release/*.aab

      # 9️⃣ Create GitHub Release (only on tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AFIExplorer ${{ github.ref_name }}
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/bundle/release/*.aab
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}