name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Setup Java
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3️⃣ Make Gradle executable
      - name: Grant execute permission
        run: chmod +x ./gradlew

      # 4️⃣ Recreate Firebase config (Base64)
      - name: Decode google-services.json
        run: |
          echo "$FIREBASE_CONFIG_BASE64" | base64 --decode > app/google-services.json
        env:
          FIREBASE_CONFIG_BASE64: ${{ secrets.FIREBASE_CONFIG_BASE64 }}

      # 5️⃣ Recreate Keystore (Base64)
      - name: Decode Keystore
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > app/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # (Optional) Debug — remove after first success
      # - name: Verify files exist
      #   run: ls -la app/

      # 6️⃣ Build signed APK + AAB
      - name: Build Signed App
        run: ./gradlew assembleRelease bundleRelease \
          -Pandroid.injected.signing.store.file=app/release.keystore \
          -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
          -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
          -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 7️⃣ Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AFIExplorer-APK
          path: app/build/outputs/apk/release/*.apk

      # 8️⃣ Upload AAB (Play Store)
      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: AFIExplorer-Bundle
          path: app/build/outputs/bundle/release/*.aab